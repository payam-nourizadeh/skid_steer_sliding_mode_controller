# Sliding-mode controller configuration for skid-steering mobile robots.
#
# See README.md for a full description of every parameter and tuning
# guidance. Values below are the defaults from the original ROS node
# (tuned for a Clearpath Jackal); they are a starting point only and
# should be re-tuned for your own robot.

robot:
  r: 0.09              # wheel effective radius [m]
  robot_width: 0.43     # distance between left/right wheels, 2c [m]
  x0: 0.05              # nominal x-position of the instantaneous centre of
                         # rotation (ICR) in the robot's local frame [m]
  x0_min: -0.12         # lower bound of the ICR uncertainty interval [m]
  x0_max: 0.15          # upper bound of the ICR uncertainty interval [m]

dynamics:
  # Identified low-level dynamics parameters (see Eq. 30 in the reference
  # paper). These describe how the robot's low-level velocity controller
  # responds to commanded vx/omega and MUST be re-identified for your own
  # robot -- they are not general-purpose defaults.
  c1: 0.26038
  c2: 0.25095
  c3: -0.00049969
  c4: 0.99646
  c5: 0.002629
  c6: 1.0768
  uncertainty_ratio: 0.0   # e.g. 0.25 for a +/-25% robustness margin on c1..c6

controller:
  landa1: 1.2   # sliding-surface constant, longitudinal error channel (s1)
  landa2: 2.6   # sliding-surface constant, lateral/heading error channel (s2)
  k1: 6.5       # robustness gain, linear-velocity channel
  k2: 9.5       # robustness gain, angular-velocity channel
  phi1: 3.5     # saturation boundary-layer thickness, linear-velocity channel
  phi2: 2.5     # saturation boundary-layer thickness, angular-velocity channel

limits:
  threshold_vx: 0.4        # maximum commanded linear velocity [m/s]
  threshold_omega: 0.9425  # maximum commanded angular velocity [rad/s] (~0.3*pi)
